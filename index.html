<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Member Login</title>
    
    <!-- Bootstrap 5.3 + icons -->
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0f3b6a;
            --primary-dark: #0a2c4a;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-bg: #f8fafc;
            --card-border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px 16px;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
        }
        .login-card {
            background: white;
            border-radius: 32px;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid var(--card-border);
        }
        .login-header {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .login-header .logo-icon {
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
        }
        .login-header .logo-icon i {
            font-size: 2.2rem;
            color: white;
        }
        .login-header h2 {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 4px;
        }
        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 0;
        }
        .form-label {
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.4rem;
            font-size: 0.9rem;
        }
        .form-control {
            border-radius: 12px;
            padding: 0.7rem 1rem;
            border: 1px solid var(--card-border);
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(15, 59, 106, 0.1);
            outline: none;
        }
        .form-control.is-valid {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        .form-control.is-invalid {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }
        .form-control:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }
        .input-group-text {
            background: transparent;
            border-right: none;
            border-radius: 12px 0 0 12px;
            color: #64748b;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }
        .btn-primary-custom {
            background: var(--primary);
            border: none;
            border-radius: 12px;
            padding: 0.85rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            color: white;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-primary-custom:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px -5px rgba(15, 59, 106, 0.3);
        }
        .btn-primary-custom:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .btn-outline-custom {
            background: transparent;
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 0.85rem;
            font-weight: 500;
            font-size: 0.9rem;
            width: 100%;
            color: #1e293b;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-outline-custom:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-outline-custom:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
 .mini-logo {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            background: #0f3b6a;
            padding: 4px;
            object-fit: contain;
        }

        .otp-input-group {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin: 1rem 0;
        }
        .otp-input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            transition: all 0.2s;
        }
        .otp-input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 2px rgba(15, 59, 106, 0.15);
        }
        .otp-input.error {
            border-color: var(--danger);
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.15);
        }
        .step {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .step.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .alert-info-custom {
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .alert-info-custom i {
            color: var(--primary);
            font-size: 1.2rem;
        }
        .member-details-preview {
            background: #f8fafc;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }
        .member-details-preview .detail-row {
            display: flex;
            padding: 3px 0;
            font-size: 0.85rem;
        }
        .member-details-preview .detail-label {
            font-weight: 500;
            color: #64748b;
            width: 100px;
            flex-shrink: 0;
        }
        .member-details-preview .detail-value {
            color: #0f172a;
        }
        .resend-timer {
            font-size: 0.8rem;
            color: #64748b;
            text-align: center;
            margin-top: 0.5rem;
        }
        .toast-custom {
            position: fixed;
            bottom: 24px;
            right: 24px;
            left: 24px;
            max-width: 420px;
            margin: 0 auto;
            background: #1f1f1f;
            color: white;
            padding: 12px 20px;
            border-radius: 48px;
            z-index: 1090;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
            font-size: 0.9rem;
        }
        .toast-custom.show {
            opacity: 1;
        }
        .toast-custom.error {
            background: #dc2626;
        }
        .toast-custom.success {
            background: #16a34a;
        }
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            backdrop-filter: blur(4px);
        }
        .spinner-overlay.active {
            visibility: visible;
        }
        .spinner-box {
            background: white;
            padding: 2rem 2.5rem;
            border-radius: 1.5rem;
            text-align: center;
        }
        .spinner-box p {
            margin-top: 12px;
            margin-bottom: 0;
            color: #64748b;
            font-size: 0.9rem;
        }
        .login-footer {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #94a3b8;
        }
        .user-info-display {
            background: #f1f5f9;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .user-info-display i {
            color: var(--primary);
        }
        @media (max-width: 480px) {
            .login-card { padding: 1.5rem 1.2rem; }
            .otp-input { width: 40px; height: 48px; font-size: 1.2rem; }
            .member-details-preview .detail-row {
                flex-direction: column;
                padding: 5px 0;
            }
            .member-details-preview .detail-label {
                width: auto;
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="logo-icon">
                 <img class="mini-logo" src="../images/favicon.svg" alt="logo">
            </div>
            <h2>Member Login</h2>
            <p>Login with OTP sent to your registered email</p>
        </div>

        <!-- Step 1: Enter Branch & Home ID -->
        <div id="step1" class="step active">
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Branch ID</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-building"></i></span>
                        <input type="text" class="form-control" id="loginBranchId" placeholder="Enter Branch ID" required autocomplete="off">
                    </div>
                    <div class="form-text" id="branchHelp"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Home ID</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-house"></i></span>
                        <input type="text" class="form-control" id="loginHomeId" placeholder="Enter Home ID" required autocomplete="off">
                    </div>
                    <div class="form-text" id="homeHelp"></div>
                </div>
                
                <!-- Member Details Preview (hidden until verified) -->
                <div id="memberDetailsPreview" style="display: none;">
                    <div class="member-details-preview">
                        <div class="detail-row">
                            <span class="detail-label"><i class="bi bi-person"></i> Name:</span>
                            <span class="detail-value" id="previewName">—</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="bi bi-envelope"></i> Email:</span>
                            <span class="detail-value" id="previewEmail">—</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label"><i class="bi bi-telephone"></i> Contact:</span>
                            <span class="detail-value" id="previewContact">—</span>
                        </div>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary-custom" id="sendOtpBtn">
                    <i class="bi bi-envelope-paper"></i> Send OTP
                </button>
            </form>
            <div class="login-footer">
                <a href="app.html" class="text-decoration-none">← Back to App</a>
            </div>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step2" class="step">
            <div class="alert-info-custom">
                <i class="bi bi-info-circle-fill"></i>
                <div>
                    <strong>OTP sent!</strong><br>
                    <span id="otpEmailDisplay">Check your email</span>
                </div>
            </div>
            
            <div class="user-info-display">
                <i class="bi bi-person-badge"></i>
                <span>Branch: <strong id="displayBranchId">—</strong> | Home: <strong id="displayHomeId">—</strong></span>
                <span class="ms-2 text-muted" style="font-size:0.8rem;" id="displayMemberName"></span>
            </div>
            
            <form id="otpForm">
                <label class="form-label">Enter 6-digit OTP</label>
                <div class="otp-input-group" id="otpContainer">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp1">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp2">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp3">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp4">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp5">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric" id="otp6">
                </div>
                <input type="hidden" id="hiddenBranchId">
                <input type="hidden" id="hiddenHomeId">
                <input type="hidden" id="hiddenEmail">
                <input type="hidden" id="hiddenMemberName">
                
                <button type="submit" class="btn-primary-custom mb-2" id="verifyOtpBtn">
                    <i class="bi bi-check-circle"></i> Verify OTP
                </button>
                
                <button type="button" class="btn-outline-custom" id="resendOtpBtn">
                    <i class="bi bi-arrow-repeat"></i> Resend OTP
                </button>
                <div class="resend-timer" id="resendTimer"></div>
            </form>
            <div class="text-center mt-3">
                <a href="#" onclick="goToStep1()" class="text-decoration-none small">← Use different credentials</a>
            </div>
        </div>

        <!-- Step 3: Success / Dashboard Redirect -->
        <div id="step3" class="step">
            <div class="text-center py-3">
                <i class="bi bi-check-circle-fill" style="font-size: 4rem; color: #16a34a;"></i>
                <h4 class="mt-3">Login Successful!</h4>
                <p class="text-muted" id="successMessage">Redirecting to dashboard...</p>
                <div class="spinner-border text-primary mt-2" role="status"></div>
            </div>
        </div>
    </div>
</div>

<!-- Toast Message -->
<div id="liveToast" class="toast-custom"><i class="bi me-2" id="toastIcon"></i><span id="toastMsg"></span></div>

<!-- Loading Spinner -->
<div id="spinnerOverlay" class="spinner-overlay">
    <div class="spinner-box">
        <div class="spinner-border text-primary" role="status"></div>
        <p id="spinnerText">Processing...</p>
    </div>
</div>

<script>
    // ================= CONFIGURATION =================
    const CONFIG = {
        SPREADSHEET_ID: "1Q7fGIi2ky6b7cYt49ljwIwGEJv3kQ8pmz47bFaPBEDs",
        API_KEY: "AIzaSyDc8tegwi2rgHyDFYm7uWBqVqQ7Fwb3uWM",
        APPS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbydLteXgfqqR9iIS0vBr7Y48Ip-HQFvr9tKZMkAbshP4HeFYsF_A70jY0CeCGal_jZ4Eg/exec"
    };

    let resendTimer = null;
    let timerSeconds = 60;
    let currentBranchId = '';
    let currentHomeId = '';
    let currentEmail = '';
    let currentMemberName = '';
    let isOtpVerified = false;

    // ================= HELPER FUNCTIONS =================
    function showToast(msg, type = 'info') {
        const toast = document.getElementById('liveToast');
        const msgSpan = document.getElementById('toastMsg');
        const icon = document.getElementById('toastIcon');
        
        msgSpan.innerText = msg;
        toast.className = 'toast-custom';
        
        if (type === 'error') {
            toast.classList.add('error');
            icon.className = 'bi bi-exclamation-circle-fill me-2';
        } else if (type === 'success') {
            toast.classList.add('success');
            icon.className = 'bi bi-check-circle-fill me-2';
        } else {
            icon.className = 'bi bi-info-circle-fill me-2';
        }
        
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    function setLoading(loading, text = 'Processing...') {
        const overlay = document.getElementById('spinnerOverlay');
        const textEl = document.getElementById('spinnerText');
        if (loading) {
            textEl.textContent = text;
            overlay.classList.add('active');
        } else {
            overlay.classList.remove('active');
        }
    }

    function goToStep1() {
        document.getElementById('step1').classList.add('active');
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.remove('active');
        
        for (let i = 1; i <= 6; i++) {
            document.getElementById(`otp${i}`).value = '';
            document.getElementById(`otp${i}`).classList.remove('error');
        }
        
        if (resendTimer) {
            clearInterval(resendTimer);
            resendTimer = null;
        }
        document.getElementById('resendTimer').innerHTML = '';
        document.getElementById('resendOtpBtn').disabled = false;
        
        document.getElementById('memberDetailsPreview').style.display = 'none';
        
        isOtpVerified = false;
    }

    // ================= OTP INPUT AUTO-TAB =================
    function setupOtpInputs() {
        for (let i = 1; i <= 6; i++) {
            const input = document.getElementById(`otp${i}`);
            
            input.addEventListener('input', (e) => {
                input.classList.remove('error');
                if (e.target.value.length === 1 && i < 6) {
                    document.getElementById(`otp${i+1}`).focus();
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 1) {
                    document.getElementById(`otp${i-1}`).focus();
                }
            });
            
            if (i === 1) {
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pasteData = (e.clipboardData || window.clipboardData).getData('text');
                    const digits = pasteData.replace(/\D/g, '').slice(0, 6);
                    for (let j = 0; j < digits.length && j < 6; j++) {
                        const targetInput = document.getElementById(`otp${j+1}`);
                        targetInput.value = digits[j];
                        targetInput.classList.remove('error');
                    }
                    if (digits.length < 6) {
                        document.getElementById(`otp${digits.length + 1}`).focus();
                    } else {
                        document.getElementById('otp6').focus();
                        setTimeout(() => {
                            document.getElementById('otpForm').dispatchEvent(new Event('submit'));
                        }, 100);
                    }
                });
            }
        }
    }

    function getOtpValue() {
        let otp = '';
        for (let i = 1; i <= 6; i++) {
            const val = document.getElementById(`otp${i}`).value;
            if (val && /^\d$/.test(val)) {
                otp += val;
            } else {
                return null;
            }
        }
        return otp;
    }

    function highlightInvalidOtp() {
        for (let i = 1; i <= 6; i++) {
            const input = document.getElementById(`otp${i}`);
            if (!input.value || !/^\d$/.test(input.value)) {
                input.classList.add('error');
            }
        }
    }

    // ================= RESEND TIMER =================
    function startResendTimer() {
        timerSeconds = 60;
        const timerDiv = document.getElementById('resendTimer');
        const resendBtn = document.getElementById('resendOtpBtn');
        resendBtn.disabled = true;
        
        if (resendTimer) clearInterval(resendTimer);
        
        resendTimer = setInterval(() => {
            timerSeconds--;
            if (timerSeconds <= 0) {
                clearInterval(resendTimer);
                resendTimer = null;
                timerDiv.innerHTML = '';
                resendBtn.disabled = false;
            } else {
                timerDiv.innerHTML = `Resend available in ${timerSeconds}s`;
            }
        }, 1000);
    }

    // ================= VALIDATE BRANCH AND HOME ID =================
    async function validateBranchAndHomeId(branchId, homeId) {
        try {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}/values/Members!A:N?key=${CONFIG.API_KEY}&_=${Date.now()}`;
            const response = await fetch(url);
            const data = await response.json();
            const rows = data.values || [];
            
            for (let i = 1; i < rows.length; i++) {
                const row = rows[i];
                if (row.length >= 12) {
                    const memberBranch = row[10] ? row[10].toString().trim() : '';
                    const memberHome = row[11] ? row[11].toString().trim() : '';
                    const memberEmail = row[9] ? row[9].toString().trim() : '';
                    const memberName = row[2] ? row[2].toString().trim() : '';
                    const memberContact = row[5] ? row[5].toString().trim() : '';
                    const memberStatus = row[12] ? row[12].toString().trim() : 'Active';
                    
                    if (memberBranch === branchId && memberHome === homeId) {
                        if (memberStatus.toLowerCase() !== 'active') {
                            return { 
                                valid: false, 
                                error: `This member is ${memberStatus}. Please contact admin.`,
                                member: null
                            };
                        }
                        
                        if (!memberEmail) {
                            return { 
                                valid: false, 
                                error: 'No email registered for this member. Please contact admin.',
                                member: null
                            };
                        }
                        
                        return { 
                            valid: true, 
                            member: {
                                name: memberName,
                                email: memberEmail,
                                contact: memberContact,
                                status: memberStatus
                            }
                        };
                    }
                }
            }
            
            return { 
                valid: false, 
                error: 'No member found with this Branch ID and Home ID combination.',
                member: null
            };
        } catch(error) {
            console.error('Validation error:', error);
            return { 
                valid: false, 
                error: 'Failed to validate credentials. Please try again.',
                member: null
            };
        }
    }

    // ================= STEP 1: SEND OTP =================
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const branchId = document.getElementById('loginBranchId').value.trim();
        const homeId = document.getElementById('loginHomeId').value.trim();
        
        if (!branchId || !homeId) {
            showToast('Please enter both Branch ID and Home ID', 'error');
            return;
        }
        
        const btn = document.getElementById('sendOtpBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Verifying...';
        
        setLoading(true, 'Verifying credentials...');
        
        try {
            const validation = await validateBranchAndHomeId(branchId, homeId);
            
            if (!validation.valid) {
                showToast(validation.error, 'error');
                setLoading(false);
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-envelope-paper"></i> Send OTP';
                return;
            }
            
            const member = validation.member;
            
            currentBranchId = branchId;
            currentHomeId = homeId;
            currentEmail = member.email;
            currentMemberName = member.name;
            
            document.getElementById('hiddenBranchId').value = branchId;
            document.getElementById('hiddenHomeId').value = homeId;
            document.getElementById('hiddenEmail').value = member.email;
            document.getElementById('hiddenMemberName').value = member.name;
            
            document.getElementById('previewName').textContent = member.name || '—';
            document.getElementById('previewEmail').textContent = member.email || '—';
            document.getElementById('previewContact').textContent = member.contact || '—';
            document.getElementById('memberDetailsPreview').style.display = 'block';
            
            document.getElementById('displayBranchId').textContent = branchId;
            document.getElementById('displayHomeId').textContent = homeId;
            document.getElementById('displayMemberName').textContent = member.name ? `(${member.name})` : '';
            document.getElementById('otpEmailDisplay').textContent = `OTP sent to ${member.email}`;
            
            setLoading(true, 'Sending OTP...');
            
            const otpUrl = new URL(CONFIG.APPS_SCRIPT_URL);
            const params = new URLSearchParams({
                action: 'requestMemberOtp',
                branchId: branchId,
                homeId: homeId,
                email: member.email,
                name: member.name
            });
            otpUrl.search = params.toString();
            
            await fetch(otpUrl.toString(), {
                method: 'GET',
                mode: 'no-cors'
            });
            
            showToast(`OTP sent to ${member.email}`, 'success');
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            
            startResendTimer();
            document.getElementById('otp1').focus();
            
        } catch(error) {
            console.error('Login error:', error);
            showToast('Failed to send OTP. Please try again.', 'error');
        }
        
        setLoading(false);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-envelope-paper"></i> Send OTP';
    });

    // ================= RESEND OTP =================
    document.getElementById('resendOtpBtn').addEventListener('click', async () => {
        if (timerSeconds > 0) {
            showToast(`Please wait ${timerSeconds} seconds`, 'error');
            return;
        }
        
        const btn = document.getElementById('resendOtpBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Sending...';
        
        setLoading(true, 'Resending OTP...');
        
        try {
            const otpUrl = new URL(CONFIG.APPS_SCRIPT_URL);
            const params = new URLSearchParams({
                action: 'requestMemberOtp',
                branchId: currentBranchId,
                homeId: currentHomeId,
                email: currentEmail,
                name: currentMemberName
            });
            otpUrl.search = params.toString();
            
            await fetch(otpUrl.toString(), {
                method: 'GET',
                mode: 'no-cors'
            });
            
            showToast(`OTP resent to ${currentEmail}`, 'success');
            startResendTimer();
            
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`otp${i}`).value = '';
                document.getElementById(`otp${i}`).classList.remove('error');
            }
            document.getElementById('otp1').focus();
            
        } catch(error) {
            console.error('Resend OTP error:', error);
            showToast('Failed to resend OTP. Please try again.', 'error');
        }
        
        setLoading(false);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Resend OTP';
    });

    // ================= STEP 2: VERIFY OTP =================
    document.getElementById('otpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const otp = getOtpValue();
        
        if (!otp) {
            highlightInvalidOtp();
            showToast('Please enter complete 6-digit OTP', 'error');
            return;
        }
        
        const btn = document.getElementById('verifyOtpBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Verifying...';
        
        setLoading(true, 'Verifying OTP...');
        
        try {
            const verifyUrl = new URL(CONFIG.APPS_SCRIPT_URL);
            const params = new URLSearchParams({
                action: 'verifyMemberOtp',
                branchId: currentBranchId,
                homeId: currentHomeId,
                email: currentEmail,
                otp: otp
            });
            verifyUrl.search = params.toString();
            
            await fetch(verifyUrl.toString(), {
                method: 'GET',
                mode: 'no-cors'
            });
            
            isOtpVerified = true;
            
            // Store session - NO TIMESTAMP STORED
            const sessionData = {
                branchId: currentBranchId,
                homeId: currentHomeId,
                email: currentEmail,
                name: currentMemberName,
                isMember: true
            };
            localStorage.setItem('memberSession', JSON.stringify(sessionData));
            sessionStorage.setItem('memberSession', JSON.stringify(sessionData));
            
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step3').classList.add('active');
            
            if (resendTimer) {
                clearInterval(resendTimer);
                resendTimer = null;
            }
            
            document.getElementById('successMessage').textContent = `Welcome ${currentMemberName || 'Member'}! Redirecting to dashboard...`;
            showToast('Login successful!', 'success');
            
            setTimeout(() => {
                window.location.href = 'member-dashboard.html?branch=' + encodeURIComponent(currentBranchId) + '&home=' + encodeURIComponent(currentHomeId);
            }, 2000);
            
        } catch(error) {
            console.error('OTP verification error:', error);
            showToast('Invalid or expired OTP. Please try again.', 'error');
            highlightInvalidOtp();
        }
        
        setLoading(false);
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-circle"></i> Verify OTP';
    });

    // ================= KEYBOARD SHORTCUTS =================
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.getElementById('step1').classList.contains('active')) {
            const activeElement = document.activeElement;
            if (activeElement && (activeElement.id === 'loginBranchId' || activeElement.id === 'loginHomeId')) {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        }
    });

    // ================= LIVE VALIDATION =================
    document.getElementById('loginBranchId').addEventListener('input', function() {
        this.classList.remove('is-valid', 'is-invalid');
        document.getElementById('branchHelp').textContent = '';
        document.getElementById('memberDetailsPreview').style.display = 'none';
    });

    document.getElementById('loginHomeId').addEventListener('input', function() {
        this.classList.remove('is-valid', 'is-invalid');
        document.getElementById('homeHelp').textContent = '';
        document.getElementById('memberDetailsPreview').style.display = 'none';
    });

    // ================= INIT =================
    document.addEventListener('DOMContentLoaded', () => {
        setupOtpInputs();
        
        const session = localStorage.getItem('memberSession');
        if (session) {
            try {
                const data = JSON.parse(session);
                if (data.branchId && data.homeId) {
                    window.location.href = 'member-dashboard.html?branch=' + encodeURIComponent(data.branchId) + '&home=' + encodeURIComponent(data.homeId);
                    return;
                }
            } catch(e) {
                localStorage.removeItem('memberSession');
                sessionStorage.removeItem('memberSession');
            }
        }
    });
</script>

</body>
</html>
